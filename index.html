<style>
/* ── 全域重設 ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a; --panel:#111827; --card:#151f35;
  --border:#1e2d4a; --accent:#4a9eff; --snow:#c8deff;
  --red:#e84855; --gold:#d4a94a; --text:#e8f0ff;
  --muted:#6b7fa8; --sakura:#f5a0b5; --green:#4ecdc4;
}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
input,textarea,select{font-family:'Noto Sans TC',sans-serif;}
button{cursor:pointer;}
a{text-decoration:none;}

/* ── 雪花 ── */
#snow-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* ── 動畫 ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade-up{animation:fadeUp .35s ease both;}

/* ── 通用卡片 ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;}
.card-hover{transition:transform .2s,box-shadow .2s;}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(74,158,255,.15);}

/* ── 頂部 Header ── */
#header{
  background:linear-gradient(160deg,#0f1e3d 0%,#0a1428 60%,#0d1117 100%);
  padding:28px 20px 72px;border-radius:0 0 32px 32px;
  position:relative;overflow:hidden;z-index:2;
}
#header::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(200,220,255,.03) 0px,rgba(200,220,255,.03) 1px,transparent 1px,transparent 28px);
}
.header-inner{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;}
.trip-title{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:900;line-height:1.25;}
.trip-sub{font-size:11px;color:var(--muted);letter-spacing:3px;margin-bottom:8px;}
.weather-strip{display:flex;gap:6px;margin-top:14px;position:relative;z-index:1;}
.weather-day{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:7px 6px;text-align:center;font-size:10px;}

/* ── 分頁導覽 ── */
#tab-bar{
  margin:-28px 16px 0;position:relative;z-index:10;
  background:var(--panel);border-radius:18px;border:1px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:flex;padding:5px;gap:3px;margin-bottom:20px;
}
.tab-btn{
  flex:1;padding:9px 0;border-radius:12px;border:none;background:transparent;
  color:var(--muted);font-weight:700;font-size:10px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans TC',sans-serif;transition:all .2s;
}
.tab-btn.active{background:rgba(74,158,255,.12);color:var(--accent);border-top:1.5px solid rgba(74,158,255,.4);}
.tab-btn span.ti{font-size:16px;}

/* ── 內容區 ── */
#content{padding:0 16px 100px;position:relative;z-index:2;}
.page{display:none;}.page.active{display:block;}

/* ── 成員頭像 ── */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-weight:700;color:#fff;flex-shrink:0;}

/* ── 按鈕 ── */
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#1a6fd4);color:#fff;
  border:none;border-radius:12px;padding:10px 18px;font-weight:700;
  font-size:13px;font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;
}
.btn-primary:hover{opacity:.85;}
.btn-ghost{
  background:rgba(74,158,255,.1);color:var(--accent);
  border:1px solid rgba(74,158,255,.3);border-radius:12px;padding:10px 18px;
  font-weight:700;font-size:13px;font-family:'Noto Sans TC',sans-serif;
}

/* ── 輸入框 ── */
.input{
  width:100%;padding:10px 14px;border-radius:12px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-family:'Noto Sans TC',sans-serif;
  margin-bottom:10px;transition:border .2s;
}
.input:focus{outline:none;border-color:var(--accent);}

/* ── 分隔線 ── */
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;opacity:.3;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── 進度條 ── */
.progress-bar{background:rgba(255,255,255,.06);border-radius:99px;height:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;transition:width .5s ease;}

/* ── 標籤 ── */
.tag{display:inline-block;font-size:10px;padding:2px 9px;border-radius:99px;margin:2px;}

/* ── 模態框 ── */
#modal-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(5,8,18,.88);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:16px;
}
#modal-overlay.open{display:flex;}
#modal-box{
  width:100%;max-width:480px;background:var(--card);
  border-radius:20px;overflow:hidden;border:1px solid var(--border);
  box-shadow:0 24px 80px rgba(0,0,0,.7);animation:fadeUp .3s ease;
}

/* ── 時間軸 ── */
.timeline-line{position:absolute;left:31px;top:16px;bottom:16px;width:1px;background:linear-gradient(to bottom,rgba(74,158,255,.6),rgba(74,158,255,.08));}
.timeline-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:10px;}

/* ── 日曆 ── */
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;border:1px solid transparent;transition:all .2s;cursor:default;}
.cal-day.trip{background:rgba(74,158,255,.08);border-color:rgba(74,158,255,.2);color:var(--text);font-weight:700;cursor:pointer;}
.cal-day.selected{background:rgba(74,158,255,.25);border-color:rgba(74,158,255,.5);}
.cal-day.inactive{color:var(--muted);}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:2px;}

/* ── 同步狀態 ── */
#sync-badge{
  position:fixed;bottom:80px;right:16px;z-index:20;
  background:var(--panel);border:1px solid var(--border);border-radius:99px;
  padding:6px 12px;font-size:11px;display:flex;align-items:center;gap:6px;
  box-shadow:0 4px 16px rgba(0,0,0,.4);transition:opacity .3s;
}
.sync-dot{width:7px;height:7px;border-radius:50%;}
.sync-dot.ok{background:var(--green);}
.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
.sync-dot.err{background:var(--red);}

/* ── 通知 Toast ── */
#toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:10px 20px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}

/* ── 載入遮罩 ── */
#loading-screen{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}

/* ── 響應式 ── */
@media(min-width:600px){
  #header{padding:36px 32px 80px;}
  #tab-bar{margin-left:auto;margin-right:auto;max-width:600px;}
  #content{max-width:600px;margin:0 auto;}
  #sync-badge{bottom:90px;}
}
</style>
</head>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:18px;" id="cal-grid"></div>
      <div id="cal-detail"></div>
    </div>
  </div>

  <!-- ── 費用頁 ── -->
  <div class="page fade-up" id="page-費用">

    <div class="card" id="budget-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:4px">預算</div>
          <div style="font-family:'Noto Serif TC',serif;font-size:26px;font-weight:900" id="budget-display" onclick="editBudget()"></div>

<script>
'use strict';

/* ── Supabase 初始化 ── */
let db = null;
let realtimeChannel = null;

async function initSupabase(){
  if(SUPABASE_URL==='PLACEHOLDER'){
    setSyncStatus('err','未設定 Supabase');
    loadLocalData();
    hideLoading();
    return;
  }
  try{
    db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    await loadAllData();
    subscribeRealtime();
    setSyncStatus('ok','已同步');
  }catch(e){
    console.error(e);
    setSyncStatus('err','連線失敗，使用本機資料');
    loadLocalData();
  }
  hideLoading();
}

async function loadAllData(){
  setSyncStatus('loading','載入中');
  const [mRes,bRes,eRes,pRes] = await Promise.all([
    db.from('ski_members').select('*').order('id'),
    db.from('ski_settings').select('*').eq('key','budget').single(),
    db.from('ski_expenses').select('*').order('created_at'),
    db.from('ski_polls').select('*').order('created_at'),
  ]);
  if(mRes.data && mRes.data.length>0) state.members = mRes.data;
  if(bRes.data) state.budget = bRes.data.value;
  if(eRes.data && eRes.data.length>0) state.expenses = eRes.data.map(e=>({...e, desc:e.item_desc, paidBy:e.paid_by, splitWith:e.split_with}));
  if(pRes.data && pRes.data.length>0) state.polls = pRes.data;
  setSyncStatus('ok','已同步');
}

/* Realtime 訂閱 */
function subscribeRealtime(){
  if(!db) return;
  realtimeChannel = db.channel('ski-trip-sync')
    .on('postgres_changes',{event:'*',schema:'public',table:'members'},()=>{ loadAllData().then(renderAll); })
    .on('postgres_changes',{event:'*',schema:'public',table:'expenses'},()=>{ loadAllData().then(renderAll); })
    .on('postgres_changes',{event:'*',schema:'public',table:'polls'},()=>{ loadAllData().then(renderAll); })
    .on('postgres_changes',{event:'*',schema:'public',table:'settings'},()=>{ loadAllData().then(renderAll); })
    .subscribe();
}

/* ════════════ 雪花動畫 ════════════ */
(function snowfall(){
  const c = document.getElementById('snow-canvas');
  const ctx = c.getContext('2d');
  let flakes = [];
  function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
  resize();
  window.addEventListener('resize',resize);
  for(let i=0;i<35;i++) flakes.push({
    x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    r:Math.random()*4+2, vx:(Math.random()-.5)*.4, vy:Math.random()*.7+.3,
    o:Math.random()*.5+.1,
  });
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle='rgba(200,220,255,0.7)';
    flakes.forEach(f=>{
      ctx.globalAlpha=f.o;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
      f.x+=f.vx; f.y+=f.vy;
      if(f.y>c.height) f.y=-5;
      if(f.x<0) f.x=c.width; if(f.x>c.width) f.x=0;
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  })();
})();

function renderFinance(){
  // 預算
  const total = state.expenses.reduce((s,e)=>s+e.amount,0);
  const pct = Math.min(100,Math.round(total/state.budget*100));
  const barColor = pct>90?'var(--red)':pct>70?'var(--gold)':'var(--accent)';
  document.getElementById('budget-display').innerHTML=`¥${state.budget.toLocaleString()} <span style="font-size:13px;color:var(--muted)">✏️</span>`;
  document.getElementById('budget-display').style.color=barColor;
  document.getElementById('spent-display').textContent=`¥${total.toLocaleString()}`;
  document.getElementById('spent-display').style.color=barColor;
  document.getElementById('budget-bar').style.cssText=`width:${pct}%;background:linear-gradient(90deg,${barColor},${barColor}88);`;
  document.getElementById('budget-pct').textContent=`${pct}% 已使用`;
  document.getElementById('budget-remain').textContent=`剩餘 ¥${Math.max(0,state.budget-total).toLocaleString()}`;

  // 支出列表
  const list = document.getElementById('expense-list');
  list.innerHTML='';
  state.expenses.forEach((e,i)=>{
    const row=document.createElement('div');
    row.style.cssText=`display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);`;
    const paidName = state.members[e.paidBy]?.name||'?';
    const splitNames = (e.splitWith||[]).map(i=>state.members[i]?.name||'?').join('、');
    row.innerHTML=`
      <div style="font-size:22px">${e.cat}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700">${e.desc}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${paidName} 付款 · ${splitNames} 分攤</div>
      </div>
      <div style="font-family:'Noto Serif TC',serif;font-weight:800;font-size:14px">¥${e.amount.toLocaleString()}</div>
      <button onclick="removeExpense(${i})" style="background:rgba(232,72,85,.15);color:var(--red);border:none;border-radius:8px;width:26px;height:26px;font-size:14px;">×</button>`;
    list.appendChild(row);
  });

  // 分帳
  renderSettlement();

  // 表單
  renderExpenseForm();
}

function renderExpenseForm(){
  const cats = document.getElementById('cat-btns'); cats.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.style.cssText=`font-size:18px;background:${c===expFormCat?'rgba(74,158,255,.2)':'transparent'};border:${c===expFormCat?'1.5px solid var(--accent)':'1.5px solid transparent'};border-radius:8px;padding:4px;`;
    b.textContent=c; b.onclick=()=>{ expFormCat=c; renderExpenseForm(); };
    cats.appendChild(b);
  });
  const pb=document.getElementById('paidby-btns'); pb.innerHTML='';
  state.members.forEach((m,i)=>{
    const b=document.createElement('button');
    b.style.cssText=`padding:6px 12px;border-radius:10px;border:none;font-weight:700;font-size:12px;font-family:'Noto Sans TC',sans-serif;transition:all .2s;background:${i===expFormPaidBy?m.color:'rgba(255,255,255,.06)'};color:${i===expFormPaidBy?'#fff':'var(--muted)'};box-shadow:${i===expFormPaidBy?`0 2px 10px ${m.color}55`:''};`;
    b.textContent=m.name; b.onclick=()=>{ expFormPaidBy=i; renderExpenseForm(); };
    pb.appendChild(b);
  });
  const sb=document.getElementById('split-btns'); sb.innerHTML='';
  state.members.forEach((m,i)=>{
    const on=expFormSplit.includes(i);
    const b=document.createElement('button');
    b.style.cssText=`padding:6px 12px;border-radius:10px;border:none;font-weight:700;font-size:12px;font-family:'Noto Sans TC',sans-serif;background:${on?m.color:'rgba(255,255,255,.06)'};color:${on?'#fff':'var(--muted)'};`;
    b.textContent=m.name;
    b.onclick=()=>{
      expFormSplit=on?expFormSplit.filter(x=>x!==i):[...expFormSplit,i];
      renderExpenseForm();
    };
    sb.appendChild(b);
  });
}

function renderSettlement(){
  const bals=state.members.map(()=>0);
  state.expenses.forEach(e=>{
    const share=e.amount/(e.splitWith?.length||1);
    (e.splitWith||[]).forEach(i=>{ if(i<bals.length) bals[i]-=share; });
    if(e.paidBy<bals.length) bals[e.paidBy]+=e.amount;
  });
  const settlements=[]; const b=[...bals];
  for(let i=0;i<20;i++){
    const hi=b.indexOf(Math.max(...b)), lo=b.indexOf(Math.min(...b));
    if(b[hi]<1) break;
    const amt=Math.min(b[hi],-b[lo]);
    if(amt<1) break;
    settlements.push({from:lo,to:hi,amount:Math.round(amt)});
    b[hi]-=amt; b[lo]+=amt;
  }
  const list=document.getElementById('settlement-list'); list.innerHTML='';
  if(!settlements.length){
    list.innerHTML='<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">大家都平帳了 🎉</div>';
    return;
  }
  settlements.forEach((s,i)=>{
    const fm=state.members[s.from], tm=state.members[s.to];
    if(!fm||!tm) return;
    const row=document.createElement('div');
    row.style.cssText=`display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:${i<settlements.length-1?'1px solid var(--border)':'none'};`;
    const av=makeAvatar(fm,30); av.style.marginRight='0';
    row.appendChild(av);
    const info=document.createElement('div');
    info.style.cssText='flex:1;font-size:13px;color:var(--muted)';
    info.innerHTML=`<span style="font-weight:700;color:${fm.color}">${fm.name}</span> 需支付 <span style="font-weight:700;color:${tm.color}">${tm.name}</span>`;
    row.appendChild(info);
    const amt=document.createElement('div');
    amt.style.cssText='font-family:Noto Serif TC,serif;font-weight:900;color:var(--red);font-size:15px';
    amt.textContent=`¥${s.amount.toLocaleString()}`;
    row.appendChild(amt);
    list.appendChild(row);
  });
}

function editBudget(){
  const v=prompt('請輸入新的總預算（¥）：', state.budget);
  if(v===null) return;
  const n=parseInt(v);
  if(isNaN(n)||n<=0){ showToast('請輸入有效金額',false); return; }
  state.budget=n;
  dbSaveBudget(n);
  renderFinance();
  showToast('預算已更新');
}

function toggleExpenseForm(){
  const f=document.getElementById('expense-form');
  f.style.display=f.style.display==='none'?'block':'none';
}

function addExpense(){
  const desc=document.getElementById('exp-desc').value.trim();
  const amount=parseInt(document.getElementById('exp-amount').value);
  if(!desc||isNaN(amount)||amount<=0||expFormSplit.length===0){
    showToast('請填寫完整資料',false); return;
  }
  const exp={id:Date.now(),desc,amount,paidBy:expFormPaidBy,splitWith:[...expFormSplit],cat:expFormCat};
  state.expenses.push(exp);
  document.getElementById('exp-desc').value='';
  document.getElementById('exp-amount').value='';
  dbSaveExpenses();
  renderFinance();
  showToast('已新增支出');
  toggleExpenseForm();
}

function removeExpense(i){
  if(!confirm(`確定要刪除「${state.expenses[i].desc}」嗎？`)) return;
  state.expenses.splice(i,1);
  dbSaveExpenses();
  renderFinance();
  showToast('已刪除');
}

/* ════════════ 成員頁 ════════════ */
function renderMembers(){
  // Header 頭像
  const av=document.getElementById('header-avatars'); av.innerHTML='';
  state.members.forEach((m,i)=>{
    const a=makeAvatar(m,34);
    a.style.marginLeft=i===0?'0':'-8px';
    a.style.zIndex=String(10-i);
    av.appendChild(a);
  });
  document.getElementById('member-count-label').textContent=`${state.members.length} 人同行`;
  document.getElementById('member-count-info').textContent=`${state.members.length} 名`;

  // 成員格
  const grid=document.getElementById('members-grid'); grid.innerHTML='';
  state.members.forEach((m,i)=>{
    const card=document.createElement('div');
    card.className='card card-hover';
    card.style.cssText=`background:linear-gradient(135deg,${m.color}11,${m.color}06);border-color:${m.color}33;text-align:center;cursor:pointer;`;
    const av2=makeAvatar(m,52); av2.style.margin='0 auto 10px';
    card.appendChild(av2);

    const nameEl=document.createElement('div');
    nameEl.style.cssText=`font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;color:var(--text);`;
    nameEl.textContent=m.name;

    const roleEl=document.createElement('div');
    roleEl.style.cssText=`font-size:11px;color:${m.color};margin-top:4px;letter-spacing:1px;`;
    roleEl.textContent=ROLES[i]||'成員';

    card.appendChild(nameEl); card.appendChild(roleEl);
    card.onclick=()=>editMemberName(m,nameEl);
    grid.appendChild(card);
  });
}

function editMemberName(m, nameEl){
  const newName=prompt(`修改「${m.name}」的名字：`, m.name);
  if(!newName||!newName.trim()) return;
  m.name=newName.trim();
  nameEl.textContent=m.name;
  dbSaveMember(m);
  renderAll();
  showToast('名字已更新');
}

/* ════════════ 投票頁 ════════════ */
function renderVote(){
  const meBtns=document.getElementById('vote-me-btns'); meBtns.innerHTML='';
  state.members.forEach((m,i)=>{
    const b=document.createElement('button');
    b.style.cssText=`flex:1;min-width:0;padding:10px 0;border-radius:12px;border:none;font-weight:700;font-size:13px;font-family:'Noto Sans TC',sans-serif;transition:all .2s;background:${i===state.currentVoter?m.color:'rgba(255,255,255,.05)'};color:${i===state.currentVoter?'#fff':'var(--muted)'};box-shadow:${i===state.currentVoter?`0 4px 14px ${m.color}44`:''};`;
    b.textContent=m.name;
    b.onclick=()=>{ state.currentVoter=i; renderVote(); };
    meBtns.appendChild(b);
  });

  const list=document.getElementById('polls-list'); list.innerHTML='';
  state.polls.forEach(poll=>{
    const total=poll.opts.reduce((s,o)=>s+o.votes.length,0);
    const card=document.createElement('div');
    card.className='card'; card.style.marginBottom='14px';
    const title=document.createElement('div');
    title.style.cssText='font-family:"Noto Serif TC",serif;font-size:15px;font-weight:700;margin-bottom:16px;';
    title.textContent='🗳 '+poll.question;
    card.appendChild(title);

    poll.opts.forEach((o,oi)=>{
      const pct=total===0?0:Math.round(o.votes.length/total*100);
      const chosen=o.votes.includes(state.currentVoter);
      const wrap=document.createElement('div');
      wrap.style.cssText='margin-bottom:12px;cursor:pointer;';
      wrap.innerHTML=`
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px">
          <span style="font-weight:${chosen?700:400};color:${chosen?'var(--accent)':'var(--text)'}">${chosen?'✓ ':''}${o.label}</span>
          <span style="color:var(--muted);font-family:'Noto Serif TC',serif;font-weight:700">${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${chosen?'linear-gradient(90deg,var(--accent),#1a6fd4)':'rgba(74,158,255,.3)'}"></div></div>
        <div style="display:flex;gap:3px;margin-top:5px" id="vote-avatars-${poll.id}-${oi}"></div>`;
      wrap.onclick=()=>castVote(poll.id, oi);
      card.appendChild(wrap);
      const me=state.currentVoter;
      setTimeout(()=>{
        const av3=document.getElementById(`vote-avatars-${poll.id}-${oi}`);
        if(!av3) return;
        o.votes.forEach(vi=>{
          if(state.members[vi]) av3.appendChild(makeAvatar(state.members[vi],18));
        });
      },0);
    });
    const footer=document.createElement('div');
    footer.style.cssText='font-size:11px;color:var(--muted);margin-top:8px';
    footer.textContent=`共 ${total} 票`;
    card.appendChild(footer);
    list.appendChild(card);
  });
}

async function castVote(pollId, optIdx){
  const poll=state.polls.find(p=>p.id===pollId);
  if(!poll) return;
  poll.opts.forEach((o,i)=>{
    if(i===optIdx){
      if(!o.votes.includes(state.currentVoter)) o.votes.push(state.currentVoter);
    } else {
      o.votes=o.votes.filter(v=>v!==state.currentVoter);
    }
  });
  await dbSavePoll(poll);
  renderVote();
}

function showNewPoll(){
  document.getElementById('new-poll-form').style.display='block';
  newPollOpts=['',''];
  renderNewPollOpts();
}
function hideNewPoll(){
  document.getElementById('new-poll-form').style.display='none';
}
function renderNewPollOpts(){
  const c=document.getElementById('new-poll-opts'); c.innerHTML='';
  newPollOpts.forEach((o,i)=>{
    const inp=document.createElement('input');
    inp.className='input'; inp.placeholder=`選項 ${i+1}`;
    inp.value=o;
    inp.oninput=e=>newPollOpts[i]=e.target.value;
    c.appendChild(inp);
  });
}
function addPollOpt(){ newPollOpts.push(''); renderNewPollOpts(); }
async function submitNewPoll(){
  const q=document.getElementById('new-poll-q').value.trim();
  if(!q||newPollOpts.some(o=>!o.trim())){ showToast('請填寫問題和所有選項',false); return; }
  const poll={id:Date.now(),question:q,opts:newPollOpts.map(l=>({label:l.trim(),votes:[]}))};
  state.polls.push(poll);
  await dbSavePoll(poll);
  hideNewPoll();
  renderVote();
  showToast('已建立投票');
}

/* ════════════ 全域渲染 ════════════ */
function renderAll(){
  renderTimeline();
  renderCalendar();
  renderFinance();
  renderMembers();
  renderVote();
}

/* ════════════ 啟動 ════════════ */
window.addEventListener('DOMContentLoaded', async ()=>{
  await initSupabase();
  renderAll();
});
</script>
